name: ✨ 功能请求
description: 提出一个新功能或改进建议
title: "[Feature] "
labels: ["enhancement", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        感谢你花时间提出这个功能请求！✨

  - type: checkboxes
    id: prerequisites
    attributes:
      label: 先决条件
      description: 在提交功能请求之前，请确认以下事项
      options:
        - label: 我已搜索现有 Issue，没有找到类似的请求
          required: true

  - type: textarea
    id: problem-description
    attributes:
      label: 问题描述
      description: 你的功能请求与某个问题有关吗？请描述一下
      placeholder: 我总是在...时感到沮丧...
    validations:
      required: false

  - type: textarea
    id: solution-description
    attributes:
      label: 解决方案描述
      description: 你希望我们做什么？请描述你想要的功能
      placeholder: 我希望有一个功能可以...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你考虑过其他替代方案吗？请描述一下
      placeholder: 我也考虑过...
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      description: 这个功能对你来说有多重要？
      multiple: false
      options:
        - 🔥 必须有（没有它我无法使用）
        - ⭐ 很重要（会大大改善体验）
        - 👍 不错（有更好，没有也能用）
        - 💭 想法（只是一个想法）
    validations:
      required: true

  - type: textarea
    id: examples
    attributes:
      label: 示例/参考
      description: 有没有其他产品有类似的功能？可以提供参考
      placeholder: 比如...产品就有这个功能...

  - type: textarea
    id: additional-context
    attributes:
      label: 其他信息
      description: 还有其他我们需要知道的信息吗？
      placeholder: 添加任何其他相关信息、截图或概念图...
